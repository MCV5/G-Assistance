kind = "mobile"
previewPath = "/"
title = "Glowcery App"
version = "1.0.0"
id = "artifacts/grocery-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18180

[services.development]
run = "pnpm --filter @workspace/grocery-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grocery-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/grocery-tracker", "run", "serve" ]

[services.env]
PORT = "18180"
BASE_PATH = "/"
