openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: groceries
    description: Grocery analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze-receipt:
    post:
      operationId: analyzeReceipt
      tags: [groceries]
      summary: Analyze a grocery receipt or shopping bag photo
      description: Uses AI vision to extract grocery items from a photo of a receipt, shopping bag, or cart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "200":
          description: Extracted items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReceiptInput:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data (without the data URI prefix)
        mimeType:
          type: string
          description: Mime type of the image (e.g., image/jpeg, image/png)
        sourceType:
          type: string
          description: What the image is - receipt, bag, or cart
          enum:
            - receipt
            - bag
            - cart
      required:
        - imageBase64
        - mimeType
        - sourceType
    ExtractedItem:
      type: object
      properties:
        name:
          type: string
          description: Normalized name of the item
        category:
          type: string
          description: Category like Produce, Dairy, Meat, Pantry, Bakery, Beverages, Frozen, Snacks, Household, Personal Care, Other
        quantity:
          type: number
          description: Quantity of the item (defaults to 1 if unknown)
        unit:
          type: string
          description: Unit of measure (e.g., piece, dozen, lb, kg, oz, ml, l). Defaults to piece.
        estimatedShelfLifeDays:
          type: integer
          description: Estimated shelf life in days. Used as a default until usage patterns are learned.
      required:
        - name
        - category
        - quantity
        - unit
        - estimatedShelfLifeDays
    ReceiptResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedItem"
        storeName:
          type: string
          description: Store name detected on the receipt, if available
        purchaseDate:
          type: string
          format: date-time
          description: Purchase date detected on the receipt, if available
      required:
        - items
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
