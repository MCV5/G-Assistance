openapi: 3.1.0
info:
  title: Glowcery App API
  version: 0.1.0
servers:
  - url: /api
tags:
  - name: Health
    description: Service health checks
  - name: Receipts
    description: Receipt extraction
  - name: Auth
    description: Email + password authentication
  - name: store
    description: Per-user grocery store
paths:
  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /analyze-receipt:
    post:
      tags: [Receipts]
      operationId: analyzeReceipt
      summary: Extract grocery items from a receipt or photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "200":
          description: Items successfully extracted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResult"
        "400":
          description: Bad request (missing image data, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error during extraction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: Create an account and start a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: Account created and session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupSuccess'
        '400':
          description: Invalid input (missing fields, weak password, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset a forgotten password with a recovery code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Password reset successfully. A fresh recovery code is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetSuccess'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Email or recovery code is incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/recovery-code:
    post:
      tags: [Auth]
      operationId: regenerateRecoveryCode
      summary: Generate a new recovery code for the current user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: A fresh recovery code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryCodeSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out the current session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/verify-email/confirm:
    post:
      tags: [Auth]
      operationId: confirmEmailVerification
      summary: Confirm email address using the link token from the verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailConfirmRequest'
      responses:
        '200':
          description: Email marked verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailSuccess'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/verify-email/send:
    post:
      tags: [Auth]
      operationId: sendVerificationEmail
      summary: Send (or resend) the verification email for the current user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Verification email queued or skipped if already verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailSendSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Too many resend attempts (optional; server-dependent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /me/store:
    get:
      tags: [store]
      operationId: getMyStore
      summary: Get the current user's grocery store
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: User's data store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStore'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [store]
      operationId: putMyStore
      summary: Replace the current user's grocery store
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserStore'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStore'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /me/profile:
    patch:
      tags: [store]
      operationId: patchMyProfile
      summary: Update dietary goals and household size
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchMyProfileRequest'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePreferences'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReceiptInput:
      type: object
      properties:
        imageBase64:
          type: string
        mimeType:
          type: string
        sourceType:
          type: string
          enum: [receipt, bag, cart]
        scannedAt:
          type: string
          description: >-
            Local calendar date when the user started analysis (YYYY-MM-DD).
            Used when the receipt has no printed purchase date.
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      required: [imageBase64, mimeType, sourceType]
    ExtractedItem:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        quantity:
          type: number
        unit:
          type: string
        estimatedShelfLifeDays:
          type: integer
        isOrganic:
          type: boolean
          description: True when item is explicitly marked organic on packaging/receipt text.
        organicConfidence:
          type: number
          minimum: 0
          maximum: 1
          description: Confidence score for organic inference (0..1).
        organicSource:
          type: string
          enum: [label, name_keyword, manual]
          description: Where organic inference came from.
      required: [name, category, quantity, unit, estimatedShelfLifeDays]
    ReceiptResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedItem"
        storeName:
          type: string
        purchaseDate:
          type: string
        purchaseDateIsEstimated:
          type: boolean
          description: True when purchaseDate was derived from scannedAt (no date on receipt).
      required: [items]
    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]
    AuthUser:
      type: object
      required:
        [id, email, firstName, lastName, profileImageUrl, createdAt, dietaryGoals, householdSize, emailVerified]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
          format: uri
        createdAt:
          type: string
          format: date-time
          description: Account creation time (ISO 8601).
        dietaryGoals:
          type: array
          items:
            type: string
          description: Saved dietary tags (subset of app-defined options).
        householdSize:
          type: integer
          minimum: 1
          maximum: 8
        emailVerified:
          type: boolean
          description: >-
            False until the user confirms their email. Accounts created before verification
            was added are reported as true.
    VerifyEmailConfirmRequest:
      type: object
      required: [email, token]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
          minLength: 20
    VerifyEmailSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    VerifyEmailSendSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    PatchMyProfileRequest:
      type: object
      properties:
        dietaryGoals:
          type: array
          items:
            type: string
        householdSize:
          type: integer
          minimum: 1
          maximum: 8
    ProfilePreferences:
      type: object
      required: [dietaryGoals, householdSize]
      properties:
        dietaryGoals:
          type: array
          items:
            type: string
        householdSize:
          type: integer
          minimum: 1
          maximum: 8
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 3
        password:
          type: string
          minLength: 6
        firstName:
          type: string
        lastName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    AuthSuccess:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        token:
          type: string
    SignupSuccess:
      type: object
      required: [user, token, recoveryCode]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        token:
          type: string
        recoveryCode:
          type: string
          description: One-time backup code shown to the user. Used to reset a forgotten password.
    PasswordResetRequest:
      type: object
      required: [email, recoveryCode, newPassword]
      properties:
        email:
          type: string
          format: email
        recoveryCode:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 6
    PasswordResetSuccess:
      type: object
      required: [success, recoveryCode]
      properties:
        success:
          type: boolean
          const: true
        recoveryCode:
          type: string
    RecoveryCodeSuccess:
      type: object
      required: [recoveryCode]
      properties:
        recoveryCode:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    UserStore:
      type: object
      required: [pantry, scans, shoppingList]
      properties:
        pantry:
          type: array
          items:
            type: object
            additionalProperties: true
        scans:
          type: array
          items:
            type: object
            additionalProperties: true
        shoppingList:
          type: array
          items:
            type: object
            additionalProperties: true
